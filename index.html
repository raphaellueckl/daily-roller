<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Roller</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --purple: #7c3aed;
        --blue: #2563eb;
        --gold: #fbbf24;
        --border: #2d2b55;
        --bg: #0d0d1a;
        --surface: #14142a;
        --surface2: #1c1c36;
        --text: #c4b5fd;
        --muted: #5b5b8a;
      }

      /* ── Background ────────────────────────────────────── */
      body {
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        min-height: 100vh;
        background: var(--bg);
        background-image:
          radial-gradient(
            ellipse 80% 60% at 20% 10%,
            rgba(124, 58, 237, 0.12) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse 60% 50% at 80% 90%,
            rgba(37, 99, 235, 0.1) 0%,
            transparent 60%
          );
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem 3rem;
        gap: 1.75rem;
        overflow-x: hidden;
      }

      /* ── Heading ───────────────────────────────────────── */
      h1 {
        font-size: clamp(1.9rem, 5vw, 2.8rem);
        font-weight: 800;
        letter-spacing: -0.03em;
        background: linear-gradient(
          135deg,
          #a78bfa 0%,
          #818cf8 50%,
          #60a5fa 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* ── Machine card ──────────────────────────────────── */
      .machine {
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: 20px;
        padding: 1.5rem 1.5rem 1.25rem;
        box-shadow:
          0 0 0 1px rgba(167, 139, 250, 0.06),
          0 8px 40px rgba(0, 0, 0, 0.45);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.1rem;
        width: min(430px, 100%);
      }

      .machine.celebrating {
        animation: glowPulse 0.55s ease-in-out 5;
      }

      @keyframes glowPulse {
        0%,
        100% {
          box-shadow:
            0 0 0 1px rgba(167, 139, 250, 0.06),
            0 8px 40px rgba(0, 0, 0, 0.45);
        }
        50% {
          box-shadow:
            0 0 0 2px rgba(251, 191, 36, 0.5),
            0 0 80px rgba(251, 191, 36, 0.35);
        }
      }

      /* ── Slot viewport ─────────────────────────────────── */
      .roller-wrap {
        width: 100%;
        position: relative;
      }

      .roller-viewport {
        width: 100%;
        height: 76px;
        overflow: hidden;
        border-radius: 12px;
        background: var(--bg);
        border: 1.5px solid var(--border);
        position: relative;
      }

      /* top/bottom fade */
      .roller-viewport::before,
      .roller-viewport::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        height: 18px;
        z-index: 3;
        pointer-events: none;
      }
      .roller-viewport::before {
        top: 0;
        background: linear-gradient(to bottom, var(--bg), transparent);
      }
      .roller-viewport::after {
        bottom: 0;
        background: linear-gradient(to top, var(--bg), transparent);
      }

      /* selection bracket */
      .bracket {
        position: absolute;
        inset: 0;
        border: 2px solid rgba(124, 58, 237, 0.45);
        border-radius: 12px;
        pointer-events: none;
        z-index: 4;
        transition: border-color 0.4s;
      }
      .celebrating .bracket {
        border-color: rgba(251, 191, 36, 0.6);
      }

      /* ── Strip ─────────────────────────────────────────── */
      .roller-strip {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
      }

      .roller-strip.spinning {
        animation: spinRoll var(--dur, 3.6s) cubic-bezier(0.12, 0.88, 0.22, 1)
          forwards;
      }

      @keyframes spinRoll {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(var(--to, 0px));
        }
      }

      .roller-item {
        height: 76px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--text);
        padding: 0 1.25rem;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      .roller-item.winner {
        color: var(--gold);
        text-shadow: 0 0 28px rgba(251, 191, 36, 0.55);
      }

      /* ── Winner label ──────────────────────────────────── */
      .winner-label {
        font-size: 0.88rem;
        font-weight: 600;
        color: var(--gold);
        letter-spacing: 0.03em;
        min-height: 1.35em;
        text-align: center;
        transition: opacity 0.3s;
      }

      /* ── Roll button ───────────────────────────────────── */
      .roll-btn {
        background: linear-gradient(135deg, var(--purple) 0%, var(--blue) 115%);
        color: #fff;
        border: none;
        padding: 0.68rem 2.6rem;
        font-size: 1.05rem;
        font-weight: 700;
        border-radius: 999px;
        cursor: pointer;
        letter-spacing: 0.06em;
        box-shadow: 0 4px 22px rgba(124, 58, 237, 0.5);
        transition:
          transform 0.12s,
          box-shadow 0.12s,
          filter 0.2s;
        outline-offset: 3px;
      }
      .roll-btn:hover:not(:disabled) {
        transform: translateY(-2px) scale(1.04);
        box-shadow: 0 8px 32px rgba(124, 58, 237, 0.7);
      }
      .roll-btn:active:not(:disabled) {
        transform: scale(0.96);
      }
      .roll-btn:focus-visible {
        outline: 2px solid var(--purple);
      }
      .roll-btn:disabled {
        filter: brightness(0.55) saturate(0.4);
        cursor: not-allowed;
      }

      /* ── Editor ────────────────────────────────────────── */
      .editor {
        width: min(430px, 100%);
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
      }

      .editor-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }

      .editor label {
        font-size: 0.75rem;
        font-weight: 700;
        color: #818cf8;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }

      .item-count {
        font-size: 0.75rem;
        color: var(--muted);
      }

      .editor textarea {
        background: var(--surface);
        border: 1.5px solid var(--border);
        color: var(--text);
        border-radius: 12px;
        padding: 0.8rem 1rem;
        font-size: 0.92rem;
        font-family: inherit;
        resize: vertical;
        min-height: 136px;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        line-height: 1.7;
        caret-color: #a78bfa;
      }
      .editor textarea:focus {
        border-color: var(--purple);
        box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.18);
      }
      .editor textarea::placeholder {
        color: #2e2e52;
      }
      .editor-hint {
        font-size: 0.73rem;
        color: var(--muted);
      }

      /* ── Confetti canvas ───────────────────────────────── */
      #confettiCanvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 999;
      }
    </style>
  </head>
  <body>
    <h1>Daily Roller</h1>

    <div class="machine" id="machine">
      <div class="roller-wrap">
        <div class="roller-viewport">
          <div class="roller-strip" id="strip">
            <div class="roller-item">—</div>
          </div>
        </div>
        <div class="bracket" id="bracket"></div>
      </div>

      <div class="winner-label" id="winnerLabel"></div>
      <button class="roll-btn" id="rollBtn">Roll!</button>
    </div>

    <div class="editor">
      <div class="editor-header">
        <label for="itemsArea">Items · one per line</label>
        <span class="item-count" id="itemCount">0 items</span>
      </div>
      <textarea
        id="itemsArea"
        placeholder="Monday tasks&#10;Tuesday tasks&#10;Wednesday tasks&#10;…"
        spellcheck="false"
        aria-label="Items list"
      ></textarea>
      <span class="editor-hint"
        >Changes are saved automatically and instantly reflected in the
        roller.</span
      >
    </div>

    <canvas id="confettiCanvas" aria-hidden="true"></canvas>

    <script>
      "use strict";

      /* ── Constants ─────────────────────────────────────── */
      const KEY = "daily-roller-items";
      const ITEM_H = 76; // must match .roller-item height in CSS
      const LOOPS = 6; // full rotations before stopping

      /* ── Elements ──────────────────────────────────────── */
      const strip = document.getElementById("strip");
      const rollBtn = document.getElementById("rollBtn");
      const winnerLabel = document.getElementById("winnerLabel");
      const itemCount = document.getElementById("itemCount");
      const machine = document.getElementById("machine");
      const itemsArea = document.getElementById("itemsArea");
      const canvas = document.getElementById("confettiCanvas");
      const ctx = canvas.getContext("2d");

      let rolling = false;

      /* ── Storage ───────────────────────────────────────── */
      function loadItems() {
        try {
          const raw = localStorage.getItem(KEY);
          if (!raw) return [];
          const arr = JSON.parse(raw);
          return Array.isArray(arr)
            ? arr.filter((s) => typeof s === "string" && s.trim())
            : [];
        } catch {
          return [];
        }
      }

      function saveItems(arr) {
        localStorage.setItem(KEY, JSON.stringify(arr));
      }

      /* ── Textarea ↔ Storage sync ───────────────────────── */
      function syncTextareaFromStorage() {
        const items = loadItems();
        const lines = itemsArea.value.split("\n").filter((l) => l.trim());
        if (JSON.stringify(lines) !== JSON.stringify(items)) {
          const [s, e] = [itemsArea.selectionStart, itemsArea.selectionEnd];
          itemsArea.value = items.join("\n");
          try {
            itemsArea.setSelectionRange(s, e);
          } catch (_) {}
        }
        updateCount(items.length);
      }

      function updateCount(n) {
        itemCount.textContent = `${n} item${n !== 1 ? "s" : ""}`;
      }

      itemsArea.addEventListener("input", () => {
        const items = itemsArea.value
          .split("\n")
          .map((l) => l.trimEnd())
          .filter((l) => l.trim());
        saveItems(items);
        updateCount(items.length);
      });

      // Keep in sync when another tab changes localStorage
      window.addEventListener("storage", (e) => {
        if (e.key === KEY) syncTextareaFromStorage();
      });

      /* ── Roller helpers ────────────────────────────────── */
      function showStatic(text) {
        strip.classList.remove("spinning");
        strip.style.cssText = "";
        strip.innerHTML = `<div class="roller-item">${escHtml(text ?? "—")}</div>`;
      }

      function escHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      /* ── Roll ──────────────────────────────────────────── */
      rollBtn.addEventListener("click", startRoll);

      function startRoll() {
        if (rolling) return;
        const items = loadItems();

        if (items.length === 0) {
          itemsArea.focus();
          return;
        }
        if (items.length === 1) {
          celebrate(items[0]);
          return;
        }

        rolling = true;
        rollBtn.disabled = true;
        winnerLabel.textContent = "";
        machine.classList.remove("celebrating");

        const winnerIdx = Math.floor(Math.random() * items.length);

        /* Build strip: LOOPS full passes, then winner at the end */
        strip.classList.remove("spinning");
        strip.style.cssText = "";

        const totalSlots = LOOPS * items.length; // number of items before winner
        const frag = document.createDocumentFragment();

        for (let i = 0; i < totalSlots; i++) {
          const el = document.createElement("div");
          el.className = "roller-item";
          el.textContent = items[i % items.length];
          frag.appendChild(el);
        }

        const winEl = document.createElement("div");
        winEl.className = "roller-item winner";
        winEl.textContent = items[winnerIdx];
        frag.appendChild(winEl);

        strip.innerHTML = "";
        strip.appendChild(frag);

        // Scroll so winner (at index totalSlots) sits at top of viewport
        const targetY = -(totalSlots * ITEM_H);

        void strip.offsetHeight; // force reflow so animation triggers fresh

        strip.style.setProperty("--to", `${targetY}px`);
        strip.style.setProperty("--dur", "3.6s");
        strip.classList.add("spinning");

        strip.addEventListener(
          "animationend",
          () => {
            rolling = false;
            rollBtn.disabled = false;
            celebrate(items[winnerIdx]);
          },
          { once: true },
        );
      }

      function celebrate(item) {
        showStatic(item);
        winnerLabel.textContent = `🎉 ${item}`;
        machine.classList.add("celebrating");
        launchConfetti();
      }

      /* ── Confetti (canvas, no dependencies) ───────────── */
      const CONFETTI_COLORS = [
        "#a78bfa",
        "#818cf8",
        "#60a5fa",
        "#34d399",
        "#fbbf24",
        "#f472b6",
        "#fb923c",
        "#f87171",
        "#ffffff",
      ];

      let pieces = [];
      let animating = false;

      function launchConfetti() {
        canvas.width = innerWidth;
        canvas.height = innerHeight;

        pieces = Array.from({ length: 130 }, () => {
          const w = 6 + Math.random() * 8;
          return {
            x: Math.random() * canvas.width,
            y: -20 - Math.random() * 200,
            vx: (Math.random() - 0.5) * 5,
            vy: 2.5 + Math.random() * 4,
            w,
            h: w * (Math.random() > 0.45 ? 0.45 : 1),
            rot: Math.random() * Math.PI * 2,
            rotV: (Math.random() - 0.5) * 0.2,
            color:
              CONFETTI_COLORS[
                Math.floor(Math.random() * CONFETTI_COLORS.length)
              ],
            alpha: 1,
          };
        });

        if (!animating) {
          animating = true;
          requestAnimationFrame(tickConfetti);
        }
      }

      function tickConfetti() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        pieces = pieces.filter((p) => p.alpha > 0.02);

        for (const p of pieces) {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.07; // gravity
          p.rot += p.rotV;
          if (p.y > canvas.height * 0.75) p.alpha -= 0.022;

          ctx.save();
          ctx.globalAlpha = p.alpha;
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          ctx.restore();
        }

        if (pieces.length > 0) {
          requestAnimationFrame(tickConfetti);
        } else {
          animating = false;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
      }

      window.addEventListener("resize", () => {
        if (animating) {
          canvas.width = innerWidth;
          canvas.height = innerHeight;
        }
      });

      /* ── Init ──────────────────────────────────────────── */
      syncTextareaFromStorage();
      const initItems = loadItems();
      showStatic(initItems.length > 0 ? initItems[0] : null);
    </script>
  </body>
</html>
